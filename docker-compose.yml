version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: ./api
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379

  worker:
    build: .
    command: ./worker
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379