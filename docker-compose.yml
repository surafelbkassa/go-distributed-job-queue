version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: job-queue-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  job-queue:
    build: .
    container_name: job-queue-app
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_COUNT=5
      - MAX_RETRIES=3
      - SERVER_PORT=8080
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data: